[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
gas_reports = ["FundVault", "AgentRegistry", "StrategyExecutor"]

[profile.fuji]
src = "src"
out = "out/fuji"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = false

[etherscan]
fuji = { key = "${AVALANCHE_API_KEY}", chain = 43113 }
mainnet = { key = "${AVALANCHE_API_KEY}", chain = 43114 }

[rpc_endpoints]
fuji = "https://api.avax-test.network/ext/bc/C/rpc"
mainnet = "https://api.avax.network/ext/bc/C/rpc"
